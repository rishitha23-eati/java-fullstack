
<!<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--Basic calculator-->
    <div class="cal-outline">
        <div class="display-keys-container">
            <div class="cal-display"> </div>
            <div class="cal-keys">
                <button class="b-num-1">
                    <p>1</p>
                </button>
                <button class="b-num-2">
                    <p>2</p>
                </button>
                <button class="b-num-3">
                    <p>3</p>
                </button>
                 <button class="b-num-plus">
                    <p>+</p>
                </button>
                <button class="b-num-4">
                    <p>4 </p>
                </button>
                <button class="b-num-5">
                    <p>5</p>
                </button>
                <button class="b-num-6">
                    <p>6</p>
                </button>
                 <button class="b-num-minus">
                    <p>-</p>
                </button>
                <button class="b-num-7">
                    <p>7</p>
                </button>
                <button class="b-num-8">
                    <p>8</p>
                </button>
                <button class="b-num-9">
                    <p>9</p>
                </button>
                 <button class="b-num-mult">
                    <p>*</p>
                </button>
                <button class="b-num-dot">
                    <p>.</p>
                </button>
                <button class="b-num-0">
                    <p>0</p>
                </button>
                <button class="b-num-equals">
                    <p>=</p>
                </button>
                 <button class="b-num-divide">
                    <p>%</p>
                </button>
          </div>
        </div> 
    </div>

</body>
</html
